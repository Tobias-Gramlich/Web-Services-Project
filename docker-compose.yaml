services:
  web-services-db:
    build:
      context: ./skyjo_src/src/main/resources/db
      dockerfile: Dockerfile.db
    platform: linux/amd64
    image: web-services-db-custom:latest  # Ein Name für den späteren Export
    container_name: web-services-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    ports:
      - ${DB_DOCKER_PORT}
    volumes:
      - web-services-db_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mariadb-admin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD}" ]
      interval: 5s
      timeout: 3s
      retries: 20

  benutzerverwaltung:
    build:
      context: ./benutzerverwaltung_src
      dockerfile: Dockerfile
    platform: linux/amd64
    image: benutzerverwaltung:latest
    container_name: benutzerverwaltung
    restart: unless-stopped
    depends_on:
      web-services-db:
        condition: service_healthy

    env_file:
      - ./.env

    environment:
      DB_HOST: web-services-db
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      
    ports:
      - ${BENUTZERVERWALTUNG_DOCKER_PORT}

  matchmaking:
    build:
      context: ./matchmaking_src
      dockerfile: Dockerfile
    platform: linux/amd64
    image: matchmaking:latest
    container_name: matchmaking
    restart: unless-stopped
    depends_on:
      web-services-db:
        condition: service_healthy
    
    env_file:
      - ./.env

    environment:
      DB_HOST: web-services-db
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      
    ports:
      - ${MATCHMAKING_DOCKER_PORT}
      - ${MATCHMAKING_DOCKER_WS_PORT}

  color-api:
    build: 
      context: ./color-api_src
      dockerfile: Dockerfile
    platform: linux/amd64
    image: color-api:latest
    container_name: color-api
    restart: unless-stopped
    depends_on:
      web-services-db:
        condition: service_healthy
    
    env_file:
      - ./.env

    environment:
      APP_PORT: ${COLOR_API_PORT}
      DB_HOST: web-services-db
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_POOL_SIZE: 5
      DB_POOL_CREATE_RETRIES: 20

    ports:
      - ${COLOR_API_DOCKER_PORT}

  skyjo-logic: 
    build: 
      context: ./skyjo_src
      dockerfile: Dockerfile
    platform: linux/amd64
    image: skyjo-logic:latest
    restart: on-failure
    container_name: skyjo-logic
    env_file:
      - ./.env

    environment:
      QUARKUS_HTTP_PORT: ${SKYJO_PORT}
      QUARKUS_HTTP_HOST: 0.0.0.0
      DB_HOST: web-services-db
      DB_PORT: ${DB_PORT}
      DB_NAME: ${SKYJO_DATABASE}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASSWORD}
      # Add this to ensure the Quarkus runtime also knows where the DB is
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:mariadb://web-services-db:${DB_PORT}/${SKYJO_DATABASE}

    ports:
      - ${SKYJO_DOCKER_PORT}
    depends_on:
      web-services-db:
        condition: service_healthy

  #frontend:
    #build:
      #context: ./demo_frontend
      #dockerfile: Dockerfile
      #args:
        #VITE_USER_API_BASE: ${VITE_USER_API_BASE:-http://localhost:3001/users}
        #VITE_COLOR_API_BASE: ${VITE_COLOR_API_BASE:-http://localhost:3003}
        #VITE_MATCHMAKING_WS_URL: ${VITE_MATCHMAKING_WS_URL:-ws://localhost:8080}
    #ports:
      #- ${FRONTEND_DEMO_PORTS}
    #restart: unless-stopped

  frontend:
      build:
        context: ./frontend_src
        dockerfile: Dockerfile
        args:
          VITE_SKYJO_API_BASE: "http://10.50.15.53:8090"
          VITE_USER_API_BASE: "http://10.50.15.53:3002"
          VITE_MATCHMAKING_HTTP_BASE: "http://10.50.15.53:3001"
          VITE_MATCHMAKING_WS_URL: "ws://10.50.15.53:8083"
          VITE_COLOR_API_BASE: "http://10.50.15.53:3003"
      platform: linux/amd64
      image: frontend:latest
      container_name: frontend
      restart: unless-stopped
      depends_on:
        - benutzerverwaltung
        - matchmaking
        - color-api
        - skyjo-logic

      ports:
        - ${FRONTEND_DOCKER_PORT} 

volumes:
  web-services-db_data: