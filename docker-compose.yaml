services:
  web-services-db:
    image: mariadb:11
    container_name: web-services-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    ports:
      - ${DB_DOCKER_PORT}
    volumes:
      - web-services-db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 20

  benutzerverwaltung:
    build:
      context: ./benutzerverwaltung_src
      dockerfile: Dockerfile
    container_name: benutzerverwaltung
    restart: unless-stopped
    depends_on:
      web-services-db:
        condition: service_healthy

    env_file:
      - ./.env

    environment:
      DB_HOST: web-services-db
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      
    ports:
      - ${BENUTZERVERWALTUNG_DOCKER_PORT}

  matchmaking:
    build:
      context: ./matchmaking_src
      dockerfile: Dockerfile
    container_name: matchmaking
    restart: unless-stopped
    depends_on:
      web-services-db:
        condition: service_healthy
    
    env_file:
      - ./.env

    environment:
      DB_HOST: web-services-db
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      
    ports:
      - ${MATCHMAKING_DOCKER_PORT}
      - ${MATCHMAKING_DOCKER_WS_PORT}

volumes:
  web-services-db_data: